name: ci

on:
  pull_request:
  push:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    uses: stevenfackley/gh-actions/.github/workflows/ci-dotnet.yml@v1
    with:
      project-name: axon
      solution-path: Axon.sln
      runs-on: windows-latest
      aot-rid: win-x64
      install-workloads: android
      nuget-config-path: NuGet.Config
    secrets: inherit
